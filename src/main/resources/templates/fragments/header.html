<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="../../static/css/style.css">
    <title>Title</title>
</head>
<body>
<header th:fragment="ShopHeader">
    <span class="title">MyShop</span>

    <a href="" class="cart-ico">
        <div>
            <span>Koszyk</span>
            <span th:if="${session.cart!=null}" th:text="${session.cart.size()}"></span>
            <span th:unless="${session.cart!=null}">0</span>
            <span>(0)</span>
            <span>zł</span>
        </div>
    </a>
</header>
</body>
</html>
